<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Goal</title>
    <link rel="stylesheet" href="createGoal.css">
</head>
<body>
    <header>
        <h1>Create Goal</h1>
        <nav>
            <a href="home.html">Back</a>
        </nav>
    </header>
    <main>
        <form action="#" method="post">
            <label for="goalTitle">Goal name</label>
            <input id="goalTitle" name="goalTitle" type="text" required />

            <label for="goalNotes">Notes</label>
            <textarea id="goalNotes" name="goalNotes" rows="4"></textarea>

            <button type="submit">Save goal</button>
        </form>
    </main>
</body>
</html>
